<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ask the CISO Portal</title>
    
    <script type="text/javascript" src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
    
    <style>
        body {
            margin: 0;
            padding: 0;
            background-color: #f4f7fa; /* רקע רך שגורם לאפקט הזכוכית לבלוט */
            font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
            color: #323130;
        }

        #container {
            padding: 25px 20px;
            display: flex;
            flex-direction: column;
        }

        .header {
            margin-bottom: 25px;
            text-align: right;
            /* כותרת באפקט זכוכית עמוק */
            background: rgba(255, 255, 255, 0.45);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .header h2 {
            font-size: 21px;
            font-weight: 700;
            margin: 0;
            color: #0078d4;
            letter-spacing: -0.5px;
        }

        .subtitle {
            font-size: 13.5px;
            color: #605e5c;
            margin-top: 10px;
            line-height: 1.6;
        }

        #button-list {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }

        .request-btn {
            /* אפקט זכוכית בסיסי - לבן חצי שקוף */
            background-color: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            color: #323130;
            
            /* מסגרת "השתקפות" עדינה מאוד */
            border: 1px solid rgba(255, 255, 255, 0.6);
            border-radius: 12px;
            padding: 18px 20px;
            text-align: right;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.25s cubic-bezier(0.25, 0.8, 0.25, 1);
            
            /* צל רך המדמה ריחוף התחלתי קל */
            box-shadow: 
                0 4px 10px rgba(0, 0, 0, 0.02),
                inset 0 1px 0 rgba(255, 255, 255, 0.5);
            display: block;
            width: 100%;
            box-sizing: border-box;
        }

        /* אפקט הריחוף המשודרג - הזכוכית נהיית צלולה ובוהקת יותר והכפתור עולה */
        .request-btn:hover {
            background-color: rgba(255, 255, 255, 0.9);
            border-color: rgba(0, 120, 212, 0.25); /* מסגרת כחלחלה עדינה בריחוף */
            color: #0078d4;
            transform: translateY(-4px);
            
            /* הצל מעמיק ויוצר תחושה של מרחק מהרקע */
            box-shadow: 
                0 12px 20px rgba(0, 120, 212, 0.06), 
                0 4px 8px rgba(0, 120, 212, 0.02);
        }

        /* לחיצה אלסטית פנימה */
        .request-btn:active {
            transform: translateY(-1px);
            background-color: rgba(245, 249, 253, 0.85);
            box-shadow: 
                0 2px 4px rgba(0, 120, 212, 0.04), 
                inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .footer {
            margin-top: 40px;
            text-align: center;
            padding-bottom: 20px;
        }
        
        .footer img {
            width: 150px;
            height: auto;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.03));
        }
    </style>
</head>
<body>

<div id="container">
    <div class="header">
        <h2>Ask the CISO – פניות אבטחת מידע</h2>
        <p class="subtitle">
            ברוכים הבאים לממשק הבקשות המהיר. כאן תוכלו להגיש פניות בנושאי שינויים, הרשאות ותהליכי אבטחה בצורה מסודרת ויעילה. 
            <br><br>
            בחירת סוג הפנייה תייצר עבורכם <strong>פורמט דיווח אוטומטי</strong> שיבטיח טיפול מהיר ומקצועי בהתאם לנהלי הארגון.
        </p>
    </div>
    
    <div id="button-list"></div>

    <div class="footer">
        <img src="https://ofirsec.co.il/wp-content/uploads/2024/06/logo-big-cyber-1-1-768x336.png" alt="OFIRSEC">
    </div>
</div>

<script type="text/javascript" src="info.js"></script>

</body>
</html>
